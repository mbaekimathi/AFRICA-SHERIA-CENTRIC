<header
  class="doc-letterhead {{ letterhead.css_modifier }}{% if not letterhead.show_logo %} doc-letterhead--no-logo{% endif %}{% if not letterhead.show_tagline %} doc-letterhead--no-tagline{% endif %}{% if not letterhead.show_contacts %} doc-letterhead--no-contacts{% endif %}"
  style="--lh-accent: {{ letterhead_accent_hex }};"
  aria-label="{{ firm.display_name }} letterhead"
>
  <div class="doc-letterhead__brand">
    {% include "accounts/partials/company_letterhead_mark.html" %}
    <div class="doc-letterhead__identity">
      <p class="doc-letterhead__name">{{ firm.display_name }}</p>
      {% if firm.tagline %}
      <p class="doc-letterhead__tagline">{{ firm.tagline }}</p>
      {% endif %}
    </div>
  </div>

  {% if letterhead_contact_rows %}
  <div class="doc-letterhead__details">
    {% for row in letterhead_contact_rows %}
    <p class="doc-letterhead__row doc-letterhead__row--contact doc-letterhead__row--bare" data-letterhead-field="{{ row.key }}">
      <span class="doc-letterhead__value">{{ row.value }}</span>
    </p>
    {% endfor %}
  </div>
  {% endif %}
</header>
