{# Soft 3D file/folder glyph for Drive browser. Expects: kind (folder|docs|sheets|slides|pdf|image|file) #}
<span class="drive-file-3d drive-file-3d--{{ kind|default:'file' }}" aria-hidden="true">
  <span class="drive-file-3d__shadow"></span>
  <span class="drive-file-3d__body">

      <ellipse class="drive-file-3d__ground" cx="24" cy="42.5" rx="14" ry="2.4"/>

    </svg>
    {% elif kind == "docs" %}
    <svg class="drive-file-3d__art" viewBox="0 0 48 48" fill="none">
      <ellipse class="drive-file-3d__ground" cx="24" cy="43" rx="11.5" ry="2.1"/>
      <path class="drive-file-3d__depth" d="M14.2 7.4h14.8L37 15.4v24.2c0 1.5-1.2 2.7-2.7 2.7H14.2c-1.5 0-2.7-1.2-2.7-2.7V10.1c0-1.5 1.2-2.7 2.7-2.7z"/>

      <text class="drive-file-3d__label" x="19.1" y="16.1" text-anchor="middle">W</text>
    </svg>
    {% elif kind == "sheets" %}
    <svg class="drive-file-3d__art" viewBox="0 0 48 48" fill="none">
      <ellipse class="drive-file-3d__ground" cx="24" cy="43" rx="11.5" ry="2.1"/>

      <rect class="drive-file-3d__slide-bar" x="17" y="21.2" width="7.2" height="1.5" rx=".6"/>
      <rect class="drive-file-3d__slide-bar drive-file-3d__slide-bar--soft" x="17" y="24.2" width="11" height="1.2" rx=".5"/>

    {% elif kind == "image" %}
    <svg class="drive-file-3d__art" viewBox="0 0 48 48" fill="none">
      <ellipse class="drive-file-3d__ground" cx="24" cy="43" rx="11.5" ry="2.1"/>
      <path class="drive-file-3d__depth" d="M11.4 10.2h26.4c1.5 0 2.7 1.2 2.7 2.7v22.2c0 1.5-1.2 2.7-2.7 2.7H11.4c-1.5 0-2.7-1.2-2.7-2.7V12.9c0-1.5 1.2-2.7 2.7-2.7z"/>

      <rect class="drive-file-3d__photo" x="13.2" y="13.4" width="21.6" height="16.8" rx="1.6"/>
      <circle class="drive-file-3d__sun" cx="18.4" cy="18.6" r="2.2"/>
      <path class="drive-file-3d__hill" d="M13.2 26.4 18.8 20.8l4.1 4.2 3.2-3.5 5.5 5.9v1.2c0 .9-.7 1.6-1.6 1.6H14.8c-.9 0-1.6-.7-1.6-1.6v-1.2z"/>

    <svg class="drive-file-3d__art" viewBox="0 0 48 48" fill="none">
