{# 3D profile face tile for client groups. Expects: profile, tone, optional size/extra_class #}
<span
  class="icon-3d icon-3d--profile icon-3d--client{% if tone %} icon-3d--{{ tone }}{% endif %}{% if size %} icon-3d--{{ size }}{% endif %}{% if float %} icon-3d--float{% endif %}{% if extra_class %} {{ extra_class }}{% endif %}"
  aria-hidden="true"
>
  <span class="icon-3d__shadow"></span>
  <span class="icon-3d__plate icon-3d__plate--profile">
    <span class="icon-3d__gloss"></span>
    <span class="icon-3d-profile">
      {% if profile.photo_url %}
      <img
        class="icon-3d-profile__photo"
        src="{{ profile.photo_url }}"
        alt=""
      >
      {% elif profile.is_corporate %}
      <span class="icon-3d-profile__face icon-3d-profile__face--corp">
        <svg class="icon-3d-profile__face-art" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" fill="currentColor" opacity=".12"/>
          <path fill="currentColor" d="M12 36V14.5c0-1.4 1.1-2.5 2.5-2.5h19c1.4 0 2.5 1.1 2.5 2.5V36H12z" opacity=".9"/>
          <path fill="#fff" d="M16.2 18.4h4.2v4.2h-4.2zm5.7 0h4.2v4.2h-4.2zm5.7 0h4.2v4.2h-4.2zM16.2 24.8h4.2v4.2h-4.2zm5.7 0h4.2v4.2h-4.2zm5.7 0h4.2v4.2h-4.2z" opacity=".55"/>
          <rect fill="#fff" x="20.5" y="30.2" width="7" height="5.8" rx="1" opacity=".7"/>
        </svg>
        <span class="icon-3d-profile__initials">{{ profile.initials }}</span>
      </span>
      {% else %}
      <span class="icon-3d-profile__face">
        <svg class="icon-3d-profile__face-art" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" fill="currentColor" opacity=".14"/>
          <ellipse cx="24" cy="20.5" rx="11.5" ry="12.5" fill="currentColor"/>
          <ellipse class="i3d-hi" cx="19.8" cy="17.2" rx="3.2" ry="2.4" fill="#fff" opacity=".35"/>
          <circle fill="#1f2937" cx="19.6" cy="20.2" r="1.55" opacity=".55"/>
          <circle fill="#1f2937" cx="28.4" cy="20.2" r="1.55" opacity=".55"/>
          <circle fill="#fff" cx="19.15" cy="19.7" r=".45" opacity=".7"/>
          <circle fill="#fff" cx="27.95" cy="19.7" r=".45" opacity=".7"/>
          <path stroke="#1f2937" stroke-width="1.5" stroke-linecap="round" opacity=".45" d="M20.4 25.4c1.4 1.5 5.8 1.5 7.2 0"/>
          <path fill="currentColor" d="M10.5 40.5c1.6-6.4 6.6-9.4 13.5-9.4s11.9 3 13.5 9.4" opacity=".95"/>
        </svg>
        <span class="icon-3d-profile__initials">{{ profile.initials }}</span>
      </span>
      {% endif %}
    </span>
  </span>
</span>
